<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Refactory</title>
    <script>
      // SPA redirect for GitHub Pages
      // Redirect 404s to index.html with the path stored in sessionStorage
      sessionStorage.redirect = location.pathname.slice(1);
      var l = location;
      l.replace(l.origin + "/refactory/" + l.pathname.split("/").slice(2).join("/"));
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
