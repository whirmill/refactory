<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refactory - Storie dalla Sala Macchine</title>
    <meta name="description" content="Storie vere dalla sala macchine. I nomi sono stati cambiati per proteggere i colpevoli." />
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the browser's history
      // using window.history.replaceState(...), which won't cause the browser to
      // attempt to load the new url.
      (function() {
        var pathSegmentsToKeep = 1; // Keep /refactory
        var l = window.location;
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, pathSegmentsToKeep) +
            decoded.slice(pathSegmentsToKeep) +
            l.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
